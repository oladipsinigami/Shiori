# Always-on OKX A2A worker — keeps Shiori marketplace status ONLINE.
# Uses Dockerfile (onchainos + okx-a2a + Node 22).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs both the HTTP brain (server.js) and the A2A marketplace worker.
# server.js owns the public PORT and serves /health.
startCommand = "node scripts/railway-start.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 20
